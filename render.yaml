services:
  # ── Backend API ────────────────────────────────────────────────────────
  - type: web
    name: vibeknowing-api
    env: python
    region: oregon
    plan: free
    buildCommand: cd apps/api && chmod +x build.sh && ./build.sh
    startCommand: cd apps/api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: vibeknowing-db
          property: connectionString
      # ── Required ──
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      # ── AI Providers (set at least one) ──
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: DEFAULT_PROVIDER
        value: openai
      # ── Research / Vanguard ──
      - key: TAVILY_API_KEY
        sync: false
      # ── Email (OTP login) ──
      - key: EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "VibeLearn <onboarding@resend.dev>"
      # ── OAuth (optional) ──
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
    autoDeploy: false

  # ── Frontend Web ───────────────────────────────────────────────────────
  - type: web
    name: vibeknowing-web
    env: node
    region: oregon
    plan: free
    buildCommand: cd apps/web && npm install && npm run build
    startCommand: cd apps/web && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: vibeknowing-api
          property: host
    autoDeploy: false

databases:
  - name: vibeknowing-db
    databaseName: vibeknowing
    user: vibeknowing
    region: oregon
    plan: free
